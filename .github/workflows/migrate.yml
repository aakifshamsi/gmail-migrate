name: Gmail IMAP Migration

on:
  schedule:
    # Daily at 03:00 UTC — low-traffic window
    - cron: '0 3 * * *'

  workflow_dispatch:
    inputs:
      strategy:
        description: 'Migration strategy'
        required: true
        default: 'size'
        type: choice
        options:
          - size
          - folder
          - random
      size_limit_mb:
        description: 'Max MB to transfer per run (0 = unlimited)'
        required: false
        default: '500'
        type: string
      email_limit:
        description: 'Max emails to migrate (0 = unlimited)'
        required: false
        default: '0'
        type: string
      folder:
        description: 'Folder/label to migrate (folder strategy only)'
        required: false
        default: 'INBOX'
        type: string
      sample_size:
        description: 'Number of emails to sample (random strategy only)'
        required: false
        default: '50'
        type: string
      dry_run:
        description: 'Dry run — report only, no writes'
        required: false
        default: false
        type: boolean
      skip_dedup:
        description: 'Skip Message-ID dedup check (use for first run on empty destinations)'
        required: false
        default: false
        type: boolean
      date_since:
        description: 'Only migrate messages since this date (DD-Mon-YYYY format, e.g., 01-Jan-2024)'
        required: false
        default: ''
        type: string
      date_before:
        description: 'Only migrate messages before this date (DD-Mon-YYYY format)'
        required: false
        default: ''
        type: string
      folder_whitelist:
        description: 'Comma-separated folder names to process (empty = all folders)'
        required: false
        default: ''
        type: string
      batch_size:
        description: 'Messages per batch for progress reporting'
        required: false
        default: '10'
        type: string
      destination:
        description: 'Target destination(s)'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - dest1
          - dest2
      delete_from_source:
        description: '[WARN] DELETE migrated mail from source after both destinations succeed'
        required: false
        default: false
        type: boolean

permissions:
  contents: write   # needed to commit state file

env:
  NTFY_MILESTONE_EMAILS: '500'
  NTFY_MILESTONE_MB: '100'

jobs:
  # ─────────────────────────────────────────────
  # Setup: compute matrix based on destination input
  # ─────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Build destination matrix
        id: build-matrix
        run: |
          DEST="${{ inputs.destination || 'both' }}"
          case "$DEST" in
            dest1)
              echo 'matrix={"include":[{"id":"dest1","user_secret":"GMAIL_DEST1_USER","pass_secret":"GMAIL_DEST1_APP_PASS","state_file":"migration-state-dest1.json"}]}' >> "$GITHUB_OUTPUT"
              ;;
            dest2)
              echo 'matrix={"include":[{"id":"dest2","user_secret":"GMAIL_DEST2_USER","pass_secret":"GMAIL_DEST2_APP_PASS","state_file":"migration-state-dest2.json"}]}' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'matrix={"include":[{"id":"dest1","user_secret":"GMAIL_DEST1_USER","pass_secret":"GMAIL_DEST1_APP_PASS","state_file":"migration-state-dest1.json"},{"id":"dest2","user_secret":"GMAIL_DEST2_USER","pass_secret":"GMAIL_DEST2_APP_PASS","state_file":"migration-state-dest2.json"}]}' >> "$GITHUB_OUTPUT"
              ;;
          esac

  # ─────────────────────────────────────────────
  # Migration: parallel per-destination
  # ─────────────────────────────────────────────
  migrate:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false    # dest2 continues if dest1 fails
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      DEST_ID:            ${{ matrix.id }}
      GMAIL_DEST_USER:    ${{ secrets[matrix.user_secret] }}
      GMAIL_DEST_APP_PASS: ${{ secrets[matrix.pass_secret] }}
      STATE_FILE:         ${{ matrix.state_file }}
      GMAIL_SOURCE_USER:  ${{ secrets.GMAIL_SOURCE_USER }}
      GMAIL_SOURCE_APP_PASS: ${{ secrets.GMAIL_SOURCE_APP_PASS }}
      NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
      STRATEGY:           ${{ inputs.strategy || 'size' }}
      SIZE_LIMIT_MB:      ${{ inputs.size_limit_mb || '500' }}
      EMAIL_LIMIT:        ${{ inputs.email_limit || '0' }}
      MIGRATION_FOLDER:   ${{ inputs.folder || 'INBOX' }}
      SAMPLE_SIZE:        ${{ inputs.sample_size || '50' }}
      DRY_RUN:            ${{ fromJSON(inputs.dry_run || false) && 'true' || 'false' }}
      SKIP_DEDUP:         ${{ fromJSON(inputs.skip_dedup || false) && 'true' || 'false' }}
      DATE_SINCE:         ${{ inputs.date_since || '' }}
      DATE_BEFORE:        ${{ inputs.date_before || '' }}
      FOLDER_WHITELIST:   ${{ inputs.folder_whitelist || '' }}
      BATCH_SIZE:         ${{ inputs.batch_size || '10' }}

    steps:
      # ── Security: mask secrets in all subsequent log output ──
      - name: Mask secrets in logs
        run: |
          echo "::add-mask::${{ secrets.GMAIL_SOURCE_APP_PASS }}"
          echo "::add-mask::${{ secrets.GMAIL_DEST1_APP_PASS }}"
          echo "::add-mask::${{ secrets.GMAIL_DEST2_APP_PASS }}"
          echo "::add-mask::${{ secrets.NTFY_TOPIC }}"
          echo "::add-mask::${{ secrets.GH_TOKEN }}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      # ── Install dependencies (pure Python, no imapsync needed) ──
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          # python3 is pre-installed; numfmt is in coreutils (pre-installed)

      # ── Make scripts executable ──
      - name: Prepare scripts
        run: |
          chmod +x scripts/migrate.sh scripts/notify.sh scripts/test-migration.sh

      # ── Initialise state file if it doesn't exist ──
      - name: Initialise state file
        run: |
          if [ ! -f "$STATE_FILE" ]; then
            cat > "$STATE_FILE" << 'EOF'
          {
            "schema_version": 1,
            "source_account": "REDACTED",
            "destination": "",
            "strategy": "",
            "processed_emails": 0,
            "processed_bytes": 0,
            "last_uid": null,
            "last_folder": null,
            "status": "pending",
            "started_at": null,
            "updated_at": null,
            "target_emails": null,
            "target_bytes": null,
            "errors": []
          }
          EOF
            echo "Created fresh state file: $STATE_FILE"
          else
            echo "Loaded existing state file: $STATE_FILE"
            cat "$STATE_FILE"
          fi

      # ── Run migration ──
      - name: Run migration
        id: migration
        run: python3 scripts/migrate.py
        continue-on-error: true   # capture exit code; handle in next steps

      # ── Run test / dry-run report ──
      - name: Run test strategy (dry-run)
        if: env.DRY_RUN == 'true'
        run: |
          scripts/test-migration.sh \
            --strategy "$STRATEGY" \
            --dest "$DEST_ID" \
            --dry-run \
            --size-limit-mb "$SIZE_LIMIT_MB" \
            --folder "$MIGRATION_FOLDER" \
            --sample-size "$SAMPLE_SIZE"

      # ── Write GitHub Actions Job Summary ──
      - name: Write job summary
        if: always()
        run: |
          STATUS="${{ steps.migration.outcome }}"
          
          # Read stats from state file
          EMAILS=$(python3 -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('processed_emails',0))")
          BYTES=$(python3 -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('processed_bytes',0))")
          BYTES_HR=$(numfmt --to=iec "$BYTES" 2>/dev/null || echo "${BYTES}B")
          ERRORS=$(python3 -c "import json; d=json.load(open('$STATE_FILE')); print(len(d.get('errors',[])))")
          LAST_FOLDER=$(python3 -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('last_folder') or 'N/A')")
          
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Gmail Migration — $DEST_ID

          | Metric | Value |
          |--------|-------|
          | Strategy | \`$STRATEGY\` |
          | Dry run | $DRY_RUN |
          | Emails migrated | $EMAILS |
          | Bytes transferred | $BYTES_HR |
          | Last folder | \`$LAST_FOLDER\` |
          | Errors | $ERRORS |
          | Outcome | $STATUS |
          | Run number | #${{ github.run_number }} |

          $([ "$DRY_RUN" = "true" ] && echo "> [WARN] **DRY RUN** — no messages were written to destination.")
          $([ "$STATUS" != "success" ] && echo "> [FAIL] **Migration encountered errors.** Check logs above.")
          EOF

      # ── Upload migration log and state as artifact ──
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-${{ matrix.id }}-run-${{ github.run_number }}
          path: |
            migration.log
            ${{ matrix.state_file }}
          retention-days: 30

      # ── Commit updated state file back to repo ──
      - name: Commit state file
        if: always() && env.DRY_RUN != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$STATE_FILE"
          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore: update migration state [$DEST_ID] $TIMESTAMP [skip ci]"
          
          # Retry push with rebase to handle parallel matrix jobs
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "State file committed on attempt $attempt."
              break
            fi
            echo "Push failed (attempt $attempt/5), rebasing and retrying..."
            git pull --rebase origin "${{ github.ref_name }}"
            sleep $((RANDOM % 8 + 3))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      # ── Final step: propagate migration failure ──
      - name: Check migration result
        if: steps.migration.outcome == 'failure' && env.DRY_RUN != 'true'
        run: |
          echo "Migration failed for $DEST_ID. See logs above."
          exit 1

  # ─────────────────────────────────────────────
  # Cleanup: delete migrated mail from source
  # Only runs after BOTH destinations succeed
  # ─────────────────────────────────────────────
  cleanup:
    needs: migrate
    if: >-
      always() &&
      needs.migrate.result == 'success' &&
      inputs.delete_from_source == true &&
      inputs.dry_run != true
    runs-on: ubuntu-latest
    env:
      GMAIL_SOURCE_USER:     ${{ secrets.GMAIL_SOURCE_USER }}
      GMAIL_SOURCE_APP_PASS: ${{ secrets.GMAIL_SOURCE_APP_PASS }}
      GMAIL_DEST1_USER:      ${{ secrets.GMAIL_DEST1_USER }}
      GMAIL_DEST1_APP_PASS:  ${{ secrets.GMAIL_DEST1_APP_PASS }}
      GMAIL_DEST2_USER:      ${{ secrets.GMAIL_DEST2_USER }}
      GMAIL_DEST2_APP_PASS:  ${{ secrets.GMAIL_DEST2_APP_PASS }}
      NTFY_TOPIC:            ${{ secrets.NTFY_TOPIC }}
      MIGRATION_FOLDER:      ${{ inputs.folder || 'INBOX' }}

    steps:
      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.GMAIL_SOURCE_APP_PASS }}"
          echo "::add-mask::${{ secrets.GMAIL_DEST1_APP_PASS }}"
          echo "::add-mask::${{ secrets.GMAIL_DEST2_APP_PASS }}"
          echo "::add-mask::${{ secrets.NTFY_TOPIC }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare scripts
        run: chmod +x scripts/*.sh

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3

      # ── Verify both destinations have the mail ──
      - name: Verify destinations before deletion
        id: verify
        run: |
          echo "## Pre-deletion verification" | tee cleanup-report.txt
          echo "" | tee -a cleanup-report.txt
          
          SKIP='[Gmail]/All Mail|[Gmail]/Spam|[Gmail]/Trash'
          
          python3 - << 'PYEOF' | tee -a cleanup-report.txt
          import imaplib, os, sys

          def get_folder_counts(user, pwd, prefix_filter=""):
              M = imaplib.IMAP4_SSL("imap.gmail.com")
              M.login(user, pwd)
              _, folders = M.list()
              counts = {}
              for f in (folders or []):
                  parts = f.decode().split(' "/" ')
                  if len(parts) < 2:
                      continue
                  name = parts[-1].strip().strip('"')
                  if prefix_filter and not name.startswith(prefix_filter):
                      continue
                  try:
                      _, data = M.select(f'"{name}"', readonly=True)
                      counts[name] = int(data[0]) if data[0] and data[0].isdigit() else 0
                  except:
                      pass
              M.logout()
              return counts

          src_user = os.environ["GMAIL_SOURCE_USER"]
          src_pass = os.environ["GMAIL_SOURCE_APP_PASS"]
          d1_user  = os.environ["GMAIL_DEST1_USER"]
          d1_pass  = os.environ["GMAIL_DEST1_APP_PASS"]
          d2_user  = os.environ["GMAIL_DEST2_USER"]
          d2_pass  = os.environ["GMAIL_DEST2_APP_PASS"]
          prefix   = f"G-{src_user}/"

          print(f"Scanning source: {src_user}")
          src = get_folder_counts(src_user, src_pass)
          
          print(f"Scanning dest1: {d1_user}")
          d1 = get_folder_counts(d1_user, d1_pass, prefix)
          
          print(f"Scanning dest2: {d2_user}")
          d2 = get_folder_counts(d2_user, d2_pass, prefix)

          # Remap dest names (strip prefix)
          d1r = {k[len(prefix):]: v for k, v in d1.items() if k.startswith(prefix)}
          d2r = {k[len(prefix):]: v for k, v in d2.items() if k.startswith(prefix)}

          SKIP = {"[Gmail]/All Mail", "[Gmail]/Spam", "[Gmail]/Trash"}
          safe_to_delete = True
          total_src_bytes = 0

          print(f"\n{'Folder':<40} {'Src':>6} {'D1':>6} {'D2':>6} {'Safe?'}")
          print(f"{'-'*40} {'---':>6} {'---':>6} {'---':>6} {'-----'}")

          for folder, src_count in sorted(src.items()):
              if folder in SKIP:
                  continue
              d1_count = d1r.get(folder, 0)
              d2_count = d2r.get(folder, 0)
              if d1_count >= src_count and d2_count >= src_count:
                  status = "[OK]"
              else:
                  status = "[WARN] NO"
                  safe_to_delete = False
              print(f"{folder:<40} {src_count:>6} {d1_count:>6} {d2_count:>6} {status}")

          print()
          if safe_to_delete:
              print("[OK] Both destinations have all mail. Safe to delete from source.")
          else:
              print("[WARN] NOT safe to delete — some folders have deltas. Run more migrations first.")
              sys.exit(1)
          PYEOF

      # ── Dry-run deletion preview ──
      - name: Dry-run deletion preview
        if: steps.verify.outcome == 'success'
        run: |
          echo ""
          echo "=== DRY-RUN: Preview of what would be deleted from source ==="
          CLEANUP_ACTION=dry-run python3 scripts/cleanup.py
          echo ""
          echo "Review above output for details."

      # ── Execute deletion from source ──
      - name: Delete migrated mail from source
        id: delete
        if: steps.verify.outcome == 'success'
        run: |
          echo "=== Deleting migrated mail from source ==="
          echo "[WARN]  This is PERMANENT. Messages will be expunged."
          CLEANUP_ACTION=delete python3 scripts/cleanup.py 2>&1 | tee cleanup-output.txt
          
          DELETED_COUNT=$(grep -c "^    Deleted:" cleanup-output.txt 2>/dev/null || echo 0)
          echo "deleted_count=$DELETED_COUNT" >> "$GITHUB_OUTPUT"
          echo "Messages deleted from source: $DELETED_COUNT"

      # ── Notify cleanup complete ──
      - name: Send cleanup notification
        if: always()
        run: |
          chmod +x scripts/notify.sh
          
          DELETED_COUNT="${{ steps.delete.outputs.deleted_count || '0' }}"
          STATUS="${{ steps.delete.outcome }}"
          
          if [ "$STATUS" = "success" ]; then
            bash scripts/notify.sh \
              "cleanup" \
              "Source Cleanup Complete" \
              "Messages deleted from source: ${DELETED_COUNT}. Source: aakifshamsi@gmail.com. Both destinations verified [OK]." \
              "high"
          else
            bash scripts/notify.sh \
              "error" \
              "[FAIL] Source Cleanup Failed" \
              "Deletion from source encountered errors. Check: ${STATUS}. Messages deleted: ${DELETED_COUNT}." \
              "urgent"
          fi

      # ── Upload cleanup artifacts ──
      - name: Upload cleanup artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-run-${{ github.run_number }}
          path: |
            cleanup-*.log
            cleanup-report.txt
            cleanup-output.txt
          retention-days: 30
          if-no-files-found: ignore

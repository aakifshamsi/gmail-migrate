name: Deploy Cloudflare Worker

# Required secrets (set in GitHub repo Settings > Secrets and variables > Actions):
#   CLOUDFLARE_API_TOKEN - Wrangler token with Workers deploy permission
#   CLOUDFLARE_ACCOUNT_ID - Your Cloudflare account ID (a5d54589a9ef58dd4cf5fa89b57e18ac)
#   GOOGLE_CLIENT_ID - Google OAuth client ID
#   GOOGLE_CLIENT_SECRET - Google OAuth client secret
#   AUTH_TOKEN - Worker API token for dashboard auth
#   NTFY_URL - ntfy.sh topic for notifications

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - work
    paths:
      - src/index.js
      - wrangler.jsonc
      - .github/workflows/deploy-worker.yml

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate required secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Put Worker Secrets
        run: |
          echo "Setting worker secrets..."
          npx wrangler@4 secret put GOOGLE_CLIENT_ID --config wrangler.jsonc <<< "${{ secrets.GOOGLE_CLIENT_ID }}"
          npx wrangler@4 secret put GOOGLE_CLIENT_SECRET --config wrangler.jsonc <<< "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          npx wrangler@4 secret put AUTH_TOKEN --config wrangler.jsonc <<< "${{ secrets.AUTH_TOKEN }}"
          npx wrangler@4 secret put NTFY_URL --config wrangler.jsonc <<< "${{ secrets.NTFY_URL }}"

      - name: Deploy Worker with Wrangler
        run: npx wrangler@4 deploy --config wrangler.jsonc

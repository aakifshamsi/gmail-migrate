name: Deploy Cloudflare Worker

# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID,
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, AUTH_TOKEN, NTFY_URL

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - work
    paths:
      - src/index.js
      - wrangler.jsonc
      - .github/workflows/deploy-worker.yml

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate required secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Put Worker Secrets
        run: |
          echo "${{ secrets.GOOGLE_CLIENT_ID }}" | npx wrangler@4 secret put GOOGLE_CLIENT_ID --config wrangler.jsonc
          echo "${{ secrets.GOOGLE_CLIENT_SECRET }}" | npx wrangler@4 secret put GOOGLE_CLIENT_SECRET --config wrangler.jsonc
          echo "${{ secrets.AUTH_TOKEN }}" | npx wrangler@4 secret put AUTH_TOKEN --config wrangler.jsonc
          echo "${{ secrets.NTFY_URL }}" | npx wrangler@4 secret put NTFY_URL --config wrangler.jsonc

      - name: Deploy Worker with Wrangler
        run: npx wrangler@4 deploy --config wrangler.jsonc

name: Gmail Migration - Tests

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Test strategy to run'
        required: true
        default: 'size'
        type: choice
        options:
          - size
          - folder
          - random
          - integrity
          - all
      size_limit_mb:
        description: 'Size limit for size strategy dry-run (MB)'
        required: false
        default: '100'
        type: string
      folder:
        description: 'Folder for folder strategy dry-run'
        required: false
        default: 'INBOX'
        type: string
      sample_size:
        description: 'Sample count for random strategy'
        required: false
        default: '20'
        type: string
      destination:
        description: 'Which destination to test against'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - dest1
          - dest2
      integrity_check:
        description: 'Run post-migration integrity check (requires prior migration)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Build destination matrix
        id: build-matrix
        run: |
          DEST="${{ inputs.destination }}"
          case "$DEST" in
            dest1)
              echo 'matrix={"include":[{"id":"dest1","dest_user":"GMAIL_DEST1_USER","state_file":"migration-state-dest1.json"}]}' >> "$GITHUB_OUTPUT"
              ;;
            dest2)
              echo 'matrix={"include":[{"id":"dest2","dest_user":"GMAIL_DEST2_USER","state_file":"migration-state-dest2.json"}]}' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'matrix={"include":[{"id":"dest1","dest_user":"GMAIL_DEST1_USER","state_file":"migration-state-dest1.json"},{"id":"dest2","dest_user":"GMAIL_DEST2_USER","state_file":"migration-state-dest2.json"}]}' >> "$GITHUB_OUTPUT"
              ;;
          esac

  test:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      DEST_ID:                  ${{ matrix.id }}
      GMAIL_DEST_USER:          ${{ secrets[matrix.dest_user] }}
      STATE_FILE:               ${{ matrix.state_file }}
      GMAIL_SOURCE_USER:        ${{ secrets.GMAIL_SOURCE_USER }}
      WORKER_URL:               ${{ secrets.WORKER_URL }}
      WORKER_AUTH_TOKEN:        ${{ secrets.WORKER_AUTH_TOKEN }}
      CF_ACCESS_CLIENT_ID:      ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET:  ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      STRATEGY:                 ${{ inputs.strategy == 'all' && 'size' || inputs.strategy }}
      SIZE_LIMIT_MB:            ${{ inputs.size_limit_mb }}
      EMAIL_LIMIT:              '0'
      MIGRATION_FOLDER:         ${{ inputs.folder }}
      SAMPLE_SIZE:              ${{ inputs.sample_size }}
      BATCH_SIZE:               '10'
      DRY_RUN:                  'true'
      SKIP_DEDUP:               'false'

    steps:
      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.WORKER_AUTH_TOKEN }}"
          echo "::add-mask::${{ secrets.CF_ACCESS_CLIENT_SECRET }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare scripts
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null; true

      - name: Validate migration script syntax
        run: python3 -m py_compile scripts/migrate.py

      - name: Verify source token retrieval from Worker
        run: |
          curl -fsS "$WORKER_URL/api/token?email=$GMAIL_SOURCE_USER" \
            -H "Authorization: Bearer $WORKER_AUTH_TOKEN" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" >/tmp/src-token.json
          python3 - << 'PY'
          import json
          d=json.load(open('/tmp/src-token.json'))
          assert d.get('access_token'), f"missing access token: {d}"
          print('Source token OK')
          PY

      - name: Verify destination token retrieval from Worker
        run: |
          curl -fsS "$WORKER_URL/api/token?email=$GMAIL_DEST_USER" \
            -H "Authorization: Bearer $WORKER_AUTH_TOKEN" \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" >/tmp/dst-token.json
          python3 - << 'PY'
          import json
          d=json.load(open('/tmp/dst-token.json'))
          assert d.get('access_token'), f"missing access token: {d}"
          print('Destination token OK')
          PY

      - name: Dry-run - Selected strategy
        if: inputs.strategy != 'all' && inputs.strategy != 'integrity'
        run: python3 scripts/migrate.py

      - name: Dry-run - All strategies
        if: inputs.strategy == 'all'
        run: |
          for S in size folder random; do
            echo "Running strategy=$S"
            STRATEGY="$S" DRY_RUN=true python3 scripts/migrate.py
          done

      - name: Integrity check (Gmail API)
        if: (inputs.strategy == 'integrity' || inputs.strategy == 'all') && inputs.integrity_check == true
        run: |
          python3 - << 'PY' | tee integrity-report.txt
          import json, os, urllib.request, urllib.parse

          WORKER_URL = os.environ['WORKER_URL'].rstrip('/')
          WORKER_TOKEN = os.environ['WORKER_AUTH_TOKEN']
          SRC = os.environ['GMAIL_SOURCE_USER']
          DST = os.environ['GMAIL_DEST_USER']
          API = "https://gmail.googleapis.com/gmail/v1/users/me"

          def worker_token(email):
              q = urllib.parse.quote(email)
              req = urllib.request.Request(f"{WORKER_URL}/api/token?email={q}", headers={"Authorization": f"Bearer {WORKER_TOKEN}"})
              with urllib.request.urlopen(req, timeout=20) as r:
                  return json.loads(r.read())['access_token']

          def api(token, path):
              req = urllib.request.Request(API + path, headers={"Authorization": f"Bearer {token}"})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read())

          src_t = worker_token(SRC)
          dst_t = worker_token(DST)
          labels = api(src_t, "/labels").get("labels", [])

          prefix = f"G-{SRC}/"
          checks = ["INBOX", "SENT", "STARRED"]
          print(f"Integrity check for {DST}")
          print(f"{'Label':<18} {'Source':>8} {'Dest':>8} {'Status':>8}")
          print("-"*50)
          for lbl in checks:
              src_n = api(src_t, f"/messages?q=in:{lbl.lower()}&maxResults=1").get("resultSizeEstimate", 0)
              dst_n = api(dst_t, f"/messages?q=label:{urllib.parse.quote(prefix+lbl)}&maxResults=1").get("resultSizeEstimate", 0)
              status = "OK" if dst_n <= src_n else "CHECK"
              print(f"{lbl:<18} {src_n:>8} {dst_n:>8} {status:>8}")
          PY

      - name: Write test summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Test Results - $DEST_ID

          | Check | Result |
          |------|--------|
          | Worker source token | ✅ |
          | Worker destination token | ✅ |
          | Dry-run migration | \
          ${{ inputs.strategy == 'integrity' && 'Skipped (integrity-only run)' || 'Executed' }} |
          | Integrity check (optional) | ${{ inputs.integrity_check }} |

          > Tests use OAuth tokens from the CF Worker token vault and Gmail API paths only.
          EOF

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.id }}-run-${{ github.run_number }}
          path: |
            migration.log
            integrity-report.txt
            ${{ matrix.state_file }}
          retention-days: 14
          if-no-files-found: ignore
